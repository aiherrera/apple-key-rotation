name: Release (macOS)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Must run after npm ci: changing the lockfile before `npm ci` can yield a broken
      # node_modules (app-builder / hdiutil then fail with ERR_ELECTRON_BUILDER_CANNOT_EXECUTE).
      - name: Align package.json version with release tag
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          npm version "$TAG_VER" --no-git-tag-version --allow-same-version

      - name: Unquarantine app-builder (macOS)
        run: |
          if [ -d node_modules/app-builder-bin ]; then
            xattr -cr node_modules/app-builder-bin 2>/dev/null || true
            chmod -R u+rx node_modules/app-builder-bin/mac 2>/dev/null || true
          fi

      - name: Sync public/version.json
        run: node scripts/sync-version-json.mjs

      # A failed or retried job can leave GitHub release assets behind; the next run then gets
      # HTTP 422 "already_exists" on upload and electron-builder surfaces ERR_ELECTRON_BUILDER_CANNOT_EXECUTE.
      - name: Delete existing GitHub release for this tag (keep tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "${GITHUB_REF_NAME}" --yes || true

      - name: Build and publish (R2 + GitHub Releases)
        env:
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: ./scripts/release-macos.sh

      - name: Publish GitHub release (exit draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --prerelease=false
